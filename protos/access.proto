syntax = "proto3";

option go_package = "FF/protos";

package ff;

import "types.proto";
import "google/api/annotations.proto";

service Access {
  rpc Echo(Empty) returns (EchoRes) {
    option (google.api.http) = {
      get: "/echo"
    };
  }

  rpc Info(Empty) returns (InfoRes) {
    option (google.api.http) = {
      get: "/info"
    };
  }
}

message EchoRes {
}

message InfoRes {
  string branch = 1;
  string commit = 2;
  string version = 3;
}
