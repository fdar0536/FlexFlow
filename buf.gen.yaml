version: v1
plugins:
  - name: cpp
    out: src-cpp/protos
  - name: grpc-cpp
    out: src-cpp/protos

  - name: go
    out: src-go/protos
    opt: paths=source_relative
  - name: go-grpc
    out: src-go/protos
    opt: paths=source_relative

  - name: grpc-gateway
    out: src-go/protos
    opt: paths=source_relative
  - name: openapiv2
    out: src-openapi